# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: MakeBinaries

on:
  workflow_dispatch:
  release:
    types: [published]
jobs:
  binaries:

    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build x64 binary
      run: dotnet publish -r linux-x64 -c Release -o "./bin/AurLand-linux-x64" -p:DebugType=None -p:DebugSymbols=false
    - name: Build arm64 binary
      run: dotnet publish -r linux-arm64 -c Release -o "./bin/AurLand-linux-arm64" -p:DebugType=None -p:DebugSymbols=false
    - name: Archive x64 binary
      run: tar -cvz -f ./bin/archive/AurLand-linux-x64.tar.gz -C ./bin/AurLand-linux-x64 .
    - name: Archive arm64 binary
      run: tar -cvz -f ./bin/archive/AurLand-linux-arm64.tar.gz -C ./bin/AurLand-linux-arm64 .
    - name: Get current tag
      run: echo "currentTag=`echo $(git describe --tags --abbrev=0)`" >> $GITHUB_ENV
    - name: Upload binaries to release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ./bin/archive/AurLand-*
        tag: ${{ env.currentTag }}
        overwrite: true
        file_glob: true
