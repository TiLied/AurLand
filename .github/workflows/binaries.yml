# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: MakeBinaries

on:
  workflow_dispatch:
  release:
    types: [published]
jobs:
  binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary_name: linux-x64
          - os: ubuntu-24.04-arm
            binary_name: linux-arm64
            
    runs-on: ${{ matrix.os }} 
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build ${{ matrix.binary_name }} binary
      run: dotnet publish -r ${{ matrix.binary_name }} -c Release -o "./bin/AurLand-${{ matrix.binary_name }}" -p:DebugType=None -p:DebugSymbols=false
    - name: Archive ${{ matrix.binary_name }} binary
      run: tar -cvz -f ./bin/archive/AurLand-${{ matrix.binary_name }}.tar.gz -C ./bin/AurLand-${{ matrix.binary_name }} .
    - name: Upload ${{ matrix.binary_name }} binary
      uses: actions/upload-artifact@v4
      with:
        name: AurLand-${{ matrix.binary_name }}.tar.gz
        path: ./bin/archive/AurLand-${{ matrix.binary_name }}.tar.gz
  upload:
    runs-on: ubuntu-latest
    needs: binaries
    permissions:
      contents: write
    steps:
    - name: Get current tag
      run: echo "currentTag=`echo $(git describe --tags --abbrev=0)`" >> $GITHUB_ENV
    - name: Upload binaries to release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ./bin/archive/AurLand-*
        tag: ${{ env.currentTag }}
        overwrite: true
        file_glob: true
